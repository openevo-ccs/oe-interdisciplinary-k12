# Path: /lpms/oe-interdisciplinary-k12/strands/strand-202-agency-development-niche.yaml

id: "OE-STRAND-000202"
type: "oe:Strand"
status: proposed
version: 0.1.0
labels:
  en: "Agency, Development, and Niche Construction"
description:
  en: >
    This strand exists only because OE-INTERDISCIPLINARY defines Agency and
    Niche Construction as first-class concepts — BIO-CORE has no equivalent,
    so LPM A has no counterpart strand. Deliberately reinforces Strand 1's
    Selection concept throughout (behavior as a factor shaping what gets
    selected) rather than treating agency as a separate, unrelated topic.
typicalGradeBand: "K-12 (spans all bands via subStrands)"
associatedDomains: ["Biology", "Social Studies"]
relations:
  prerequisiteOf: ["OE-STRAND-000203"]

subStrands:

  - id: "OE-STRAND-000221"
    type: "oe:SubStrand"
    status: proposed
    version: 0.1.0
    labels:
      en: "Living Things Act to Meet Their Needs"
    typicalGradeBand: "K-2"
    required: true
    associatedDomains: ["Biology"]
    concepts:
      - id: "OE-CONCEPT-000211"   # Agency
        emphasis: primary
      - id: "OE-CONCEPT-000210"   # Development
        emphasis: reinforcing
    performanceIndicators:
      - "Describes what an animal does to find food, stay safe, or care for its young."
      - "Describes ways a person or animal grows and changes as it gets older."
      - "Recognizes that acting to meet a need does not require the same kind of thinking a person does."

  - id: "OE-STRAND-000222"
    type: "oe:SubStrand"
    status: proposed
    version: 0.1.0
    labels:
      en: "Comparing How Different Living Things Act, Learn, and Teach"
    typicalGradeBand: "3-5"
    required: true
    associatedDomains: ["Biology", "Social Studies"]
    concepts:
      - id: "OE-CONCEPT-000211"   # Agency
        emphasis: primary
      - id: "OE-CONCEPT-000215"   # Learning
        emphasis: primary
      - id: "OE-CONCEPT-000216"   # Teaching
        emphasis: reinforcing
      - id: "OE-CONCEPT-000212"   # Scaffolding
        emphasis: reinforcing
    performanceIndicators:
      - "Compares goal-directed behavior across two different species and describes how their capacities differ."
      - "Describes an example of an animal or person learning a behavior by watching another individual."
      - "Describes a simple example of scaffolding (a helper providing support that is gradually reduced as skill grows)."
    relations:
      recommendedSequence: []

  - id: "OE-STRAND-000223"
    type: "oe:SubStrand"
    status: proposed
    version: 0.1.0
    labels:
      en: "Agency, Niche Construction, and Selection"
    typicalGradeBand: "6-8"
    required: true
    associatedDomains: ["Biology"]
    concepts:
      - id: "OE-CONCEPT-000211"   # Agency
        emphasis: primary
      - id: "OE-CONCEPT-000209"   # Niche Construction
        emphasis: primary
      - id: "OE-CONCEPT-000210"   # Development
        emphasis: reinforcing
      - id: "OE-CONCEPT-000213"   # Selection (cross-ref to Strand 1)
        emphasis: reinforcing
    performanceIndicators:
      - "Defines agency as a capacity to regulate behavior toward a goal-state, without requiring conscious intention."
      - "Explains niche construction using an example of an organism modifying its own environment (e.g., an earthworm improving soil) in a way that changes what gets selected in later generations."
      - "Explains how a behavior (agency) and a selection process (Strand 1) can be connected without invoking evolutionary foresight."

  - id: "OE-STRAND-000224"
    type: "oe:SubStrand"
    status: proposed
    version: 0.1.0
    labels:
      en: "Agency and Niche Construction Across Biological and Technological Systems"
    typicalGradeBand: "9-12"
    associatedDomains: ["Biology", "Computer Science", "Social Studies"]
    concepts:
      - id: "OE-CONCEPT-000211"   # Agency
        emphasis: primary
      - id: "OE-CONCEPT-000209"   # Niche Construction
        emphasis: primary
      - id: "OE-CONCEPT-000215"   # Learning
        emphasis: reinforcing
      - id: "OE-CONCEPT-000216"   # Teaching
        emphasis: reinforcing
      - id: "OE-CONCEPT-000213"   # Selection (cross-ref to Strand 1)
        emphasis: reinforcing
    performanceIndicators:
      - "Places several organisms (bacterium, bird, chimpanzee, human) along an agency spectrum and justifies each placement."
      - "Compares biological niche construction (earthworms, beavers) with human-technological niche construction (cities, digital information environments)."
      - "Analyzes a case where a designed system (e.g., a recommendation algorithm) exhibits both intentional design (agency) and emergent, non-designed behavior."
    required: false
    # NOTE: marked optional (elective/regional extension) at this specific
    # sub-strand only — the AI-system application is treated as an advanced
    # extension, not core content, consistent with the phased, cautious
    # approach to frontier interdisciplinary territory.