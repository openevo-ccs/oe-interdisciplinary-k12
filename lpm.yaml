# ============================================================================
# OE-SANDBOX-LPM-000004 — sandbox-tier fork of OE-LPM-000002 (RFC-0010).
# Adds a 9-12 capstone Strand on machine culture and human-AI coevolution,
# grounded in the real research program of the Center for Humans and
# Machines (Max Planck Institute for Human Development, Berlin — a
# different institute from MPI-EVA/OE-SANDBOX-LPM-000003, worth being
# precise about) — specifically Brinkmann, Rahwan, and colleagues' 2023
# Nature Human Behaviour paper "Machine culture." Addresses the Selection
# cross-domain case study's finding that trunk OE-STRAND-000224 asserts an
# AI/agency analogy with real citation gaps, by grounding this fork's
# claims in an actual, checkable AI-and-culture research paper rather than
# a parenthetical example.
# ============================================================================

id: "OE-SANDBOX-LPM-000004"
type: "oe:LPM"
sandboxMeta:
  created: "2026-07-21"
  expiresOn: "2027-07-21"
  status: active
forkedFrom: "OE-LPM-000002"
version: 0.1.0

labels:
  en: "OE-Interdisciplinary: Machine Culture and Human-AI Coevolution Capstone"

description:
  en: >
    A sandbox fork of oe-interdisciplinary-k12 adding a 9-12 capstone
    Strand on machine culture — cases where AI systems participate in,
    rather than merely transmit, the variation/transmission/selection
    dynamics of cultural evolution (Brinkmann et al. 2023). Includes an
    explicitly self-referential closing case study: OECB's own
    RFC-0010 sandbox-LPM-forking mechanism, examined as a worked
    example of curriculum models undergoing the same kind of
    variation-and-selective-retention dynamic the Strand's academic
    content describes — framed carefully as an illustrative analogy,
    not a claim that curriculum governance is scientifically equivalent
    to biological or cultural evolution (see RFC-0010's own framing-note
    discipline on this point).

authors:
  - name: "OpenEvo Computational Curriculum Studies Working Group"

